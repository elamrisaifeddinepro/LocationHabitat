databaseChangeLog:
  - changeSet:
      id: 001-create-announcements
      author: chatgpt
      changes:
        - createTable:
            tableName: announcements
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(150)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: city
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: address
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: monthly_rent
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: number_of_rooms
                  type: INTEGER
                  constraints:
                    nullable: false

              - column:
                  name: area
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false

              - column:
                  name: active
                  type: BOOLEAN
                  constraints:
                    nullable: false

              - column:
                  name: view_count
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: owner_auth_user_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: owner_email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false