databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: chatgpt
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: nom
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: prenom
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: numero
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: telephone
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: courriel
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: adresse
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false