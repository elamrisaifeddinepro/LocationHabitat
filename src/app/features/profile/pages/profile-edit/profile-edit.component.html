<div class="profile-container">
  <mat-card class="profile-card">
    <mat-card-header>
      <mat-card-title>Mon profil</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form (submit)="onSubmit($event)">
        <div class="form-row">
          <mat-form-field class="half-width">
            <mat-label>Nom</mat-label>
            <input matInput [field]="profileForm.nom">
            <app-form-errors [field]="profileForm.nom" [submitted]="submitted"></app-form-errors>
          </mat-form-field>

          <mat-form-field class="half-width">
            <mat-label>Prénom</mat-label>
            <input matInput [field]="profileForm.prenom">
            <app-form-errors [field]="profileForm.prenom" [submitted]="submitted"></app-form-errors>
          </mat-form-field>
        </div>

        <mat-form-field class="full-width">
          <mat-label>Numéro d'identification</mat-label>
          <input matInput [field]="profileForm.numero">
          <app-form-errors [field]="profileForm.numero" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Téléphone</mat-label>
          <input matInput placeholder="5148234567" [field]="profileForm.telephone">
          <app-form-errors [field]="profileForm.telephone" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" [field]="profileForm.courriel">
          <app-form-errors [field]="profileForm.courriel" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Adresse</mat-label>
          <textarea matInput rows="2" [field]="profileForm.adresse"></textarea>
          <app-form-errors [field]="profileForm.adresse" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <mat-divider style="margin: 20px 0;"></mat-divider>

        <mat-form-field class="full-width">
          <mat-label>Mot de passe actuel (pour confirmer)</mat-label>
          <input matInput type="password" [field]="profileForm.currentPassword">
          <app-form-errors [field]="profileForm.currentPassword" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <div class="form-actions">
          <button mat-button type="button" (click)="cancel()">Annuler</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="profileForm().invalid()">
            Enregistrer
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
