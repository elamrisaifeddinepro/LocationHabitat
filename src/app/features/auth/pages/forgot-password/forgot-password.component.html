<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Mot de passe oublié</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form novalidate (submit)="onSubmit($event)">
        <mat-form-field class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" placeholder="exemple@email.com" [field]="forgotForm.courriel">
          <app-form-errors [field]="forgotForm.courriel" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="forgotForm().invalid() || loading" class="full-width">
          {{ loading ? 'Envoi...' : 'Demander la réinitialisation' }}
        </button>
      </form>

      @if (successMessage) {
        <div class="register-link" style="margin-top: 16px;">
          <p>{{ successMessage }}</p>

          @if (resetToken) {
            <p><strong>Token :</strong> {{ resetToken }}</p>
            <p>
              <a [routerLink]="['/auth/reset-password']" [queryParams]="{ token: resetToken }">
                Aller à la page de réinitialisation
              </a>
            </p>
          }
        </div>
      }

      <div class="register-link">
        <p><a routerLink="/auth/login">Retour à la connexion</a></p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
