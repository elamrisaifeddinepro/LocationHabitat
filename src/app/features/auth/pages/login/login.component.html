<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Connexion</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form novalidate (submit)="onSubmit($event)">
        <mat-form-field class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" placeholder="exemple@email.com" [field]="loginForm.courriel">
          <app-form-errors [field]="loginForm.courriel" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Mot de passe</mat-label>
          <input matInput type="password" [field]="loginForm.password">
          <app-form-errors [field]="loginForm.password" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="loginForm().invalid() || loading" class="full-width">
          {{ loading ? 'Connexion...' : 'Se connecter' }}
        </button>
      </form>

      <div class="register-link">
        <p>Pas encore de compte ? <a routerLink="/auth/register">S'inscrire</a></p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
