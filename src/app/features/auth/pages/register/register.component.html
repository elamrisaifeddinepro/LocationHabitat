<div class="register-container">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>Inscription</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form novalidate (submit)="onSubmit($event)">
        <div class="form-row">
          <mat-form-field class="half-width">
            <mat-label>Nom</mat-label>
            <input matInput [field]="registerForm.nom">
            <app-form-errors [field]="registerForm.nom" [submitted]="submitted"></app-form-errors>
          </mat-form-field>

          <mat-form-field class="half-width">
            <mat-label>Prénom</mat-label>
            <input matInput [field]="registerForm.prenom">
            <app-form-errors [field]="registerForm.prenom" [submitted]="submitted"></app-form-errors>
          </mat-form-field>
        </div>

        <mat-form-field class="full-width">
          <mat-label>Numéro d'identification</mat-label>
          <input matInput [field]="registerForm.numero">
          <app-form-errors [field]="registerForm.numero" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Téléphone</mat-label>
          <input matInput placeholder="5148234567" [field]="registerForm.telephone">
          <app-form-errors [field]="registerForm.telephone" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" [field]="registerForm.courriel">
          <app-form-errors [field]="registerForm.courriel" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Mot de passe</mat-label>
          <input matInput type="password" [field]="registerForm.password">
          <app-form-errors [field]="registerForm.password" [submitted]="submitted"></app-form-errors>
          <mat-hint>Au moins 8 caractères, une majuscule, une minuscule et un chiffre</mat-hint>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Confirmer le mot de passe</mat-label>
          <input matInput type="password" [field]="registerForm.confirmPassword">
          <app-form-errors [field]="registerForm.confirmPassword" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Adresse</mat-label>
          <textarea matInput rows="2" [field]="registerForm.adresse"></textarea>
          <app-form-errors [field]="registerForm.adresse" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="registerForm().invalid() || loading" class="full-width">
          {{ loading ? 'Inscription...' : 'S\'inscrire' }}
        </button>
      </form>

      <div class="login-link">
        <p>Déjà un compte ? <a routerLink="/auth/login">Se connecter</a></p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
