<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Réinitialiser le mot de passe</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form novalidate (submit)="onSubmit($event)">
        <mat-form-field class="full-width">
          <mat-label>Token</mat-label>
          <input matInput [field]="resetForm.token">
          <app-form-errors [field]="resetForm.token" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Nouveau mot de passe</mat-label>
          <input matInput type="password" [field]="resetForm.newPassword">
          <app-form-errors [field]="resetForm.newPassword" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Confirmer le mot de passe</mat-label>
          <input matInput type="password" [field]="resetForm.confirmPassword">
          <app-form-errors [field]="resetForm.confirmPassword" [submitted]="submitted"></app-form-errors>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="resetForm().invalid() || loading" class="full-width">
          {{ loading ? 'Réinitialisation...' : 'Réinitialiser' }}
        </button>
      </form>

      @if (successMessage) {
        <div class="register-link" style="margin-top: 16px;">
          <p>{{ successMessage }}</p>
          <p><a routerLink="/auth/login">Aller à la connexion</a></p>
        </div>
      }
    </mat-card-content>
  </mat-card>
</div>
